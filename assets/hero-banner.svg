<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glow1" cx="900" cy="200" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="200" cy="300" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <!-- Terminal background -->
    <linearGradient id="termBg" x1="660" y1="60" x2="660" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#151925"/>
    </linearGradient>
    <!-- Terminal border -->
    <linearGradient id="termBorder" x1="660" y1="60" x2="660" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2d3548"/>
      <stop offset="100%" stop-color="#1e2433"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#glow1)"/>
  <rect width="1200" height="400" fill="url(#glow2)"/>

  <!-- Decorative dots (subtle) -->
  <circle cx="100" cy="80" r="1.5" fill="#3b82f6" opacity="0.3"/>
  <circle cx="180" cy="50" r="1" fill="#8b5cf6" opacity="0.25"/>
  <circle cx="1100" cy="350" r="1.5" fill="#3b82f6" opacity="0.2"/>
  <circle cx="1050" cy="60" r="1" fill="#60a5fa" opacity="0.15"/>
  <circle cx="50" cy="320" r="1" fill="#a78bfa" opacity="0.2"/>

  <!-- Left side: Branding -->
  <g transform="translate(80, 110)">
    <!-- Apple-style command prompt icon -->
    <rect x="0" y="0" width="52" height="52" rx="12" fill="#3b82f6" opacity="0.12"/>
    <text x="26" y="35" font-family="SF Mono, Menlo, Consolas, monospace" font-size="28" fill="#60a5fa" text-anchor="middle" font-weight="600">&gt;_</text>

    <!-- Title -->
    <text x="66" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" fill="#f8fafc" font-weight="700" letter-spacing="-0.5">appleads</text>
    <text x="66" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#64748b" font-weight="500" letter-spacing="3" text-transform="uppercase">CLI</text>
  </g>

  <!-- Tagline -->
  <text x="80" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="#94a3b8" font-weight="400">
    Apple Search Ads from your terminal.
  </text>
  <text x="80" y="236" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="#94a3b8" font-weight="400">
    Scriptable. Multi-account. CI-ready.
  </text>

  <!-- Feature pills -->
  <g transform="translate(80, 268)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="88" height="28" rx="14" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1"/>
    <text x="44" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="500">Go · v5 API</text>
    <!-- Pill 2 -->
    <rect x="98" y="0" width="86" height="28" rx="14" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="1"/>
    <text x="141" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">--dry-run</text>
    <!-- Pill 3 -->
    <rect x="194" y="0" width="105" height="28" rx="14" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-opacity="0.2" stroke-width="1"/>
    <text x="246" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#34d399" text-anchor="middle" font-weight="500">JSON output</text>
  </g>

  <!-- Decorative line -->
  <line x1="80" y1="320" x2="440" y2="320" stroke="#1e293b" stroke-width="1"/>
  <text x="80" y="348" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#475569">github.com/ferdikt/appleads-cli</text>

  <!-- Right side: Terminal window -->
  <g transform="translate(500, 40)">
    <!-- Terminal outer frame -->
    <rect x="0" y="0" width="640" height="320" rx="12" fill="url(#termBorder)"/>
    <rect x="1" y="1" width="638" height="318" rx="11" fill="url(#termBg)"/>

    <!-- Title bar -->
    <rect x="1" y="1" width="638" height="36" rx="11" fill="#1e2433"/>
    <rect x="1" y="26" width="638" height="11" fill="#1e2433"/>
    <!-- Traffic lights -->
    <circle cx="22" cy="19" r="6" fill="#ff5f57"/>
    <circle cx="42" cy="19" r="6" fill="#febc2e"/>
    <circle cx="62" cy="19" r="6" fill="#28c840"/>
    <!-- Tab title -->
    <text x="320" y="23" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12" fill="#64748b" text-anchor="middle">appleads — zsh</text>
    <!-- Title bar separator -->
    <line x1="1" y1="37" x2="639" y2="37" stroke="#2d3548" stroke-width="0.5"/>

    <!-- Terminal content -->
    <g transform="translate(24, 58)">
      <!-- Line 1 -->
      <text y="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13">
        <tspan fill="#6b7280">$</tspan>
        <tspan fill="#e2e8f0"> appleads doctor</tspan>
      </text>

      <!-- Line 2-8: Doctor output -->
      <text y="24" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5">
        <tspan fill="#34d399">✓</tspan>
        <tspan fill="#94a3b8"> Config file resolved</tspan>
      </text>
      <text y="44" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5">
        <tspan fill="#34d399">✓</tspan>
        <tspan fill="#94a3b8"> Auth fields present</tspan>
      </text>
      <text y="64" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5">
        <tspan fill="#34d399">✓</tspan>
        <tspan fill="#94a3b8"> Token valid (expires in 52m)</tspan>
      </text>
      <text y="84" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5">
        <tspan fill="#34d399">✓</tspan>
        <tspan fill="#94a3b8"> Org resolved</tspan>
        <tspan fill="#475569"> · </tspan>
        <tspan fill="#60a5fa">Acme Inc.</tspan>
      </text>
      <text y="104" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5">
        <tspan fill="#34d399">✓</tspan>
        <tspan fill="#94a3b8"> API reachable</tspan>
        <tspan fill="#475569"> · </tspan>
        <tspan fill="#94a3b8">v5</tspan>
      </text>

      <!-- Blank line -->

      <!-- Line 9 -->
      <text y="140" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13">
        <tspan fill="#6b7280">$</tspan>
        <tspan fill="#e2e8f0"> appleads campaigns list </tspan>
        <tspan fill="#fbbf24">--limit 3</tspan>
        <tspan fill="#e2e8f0"> </tspan>
        <tspan fill="#fbbf24">--output json</tspan>
      </text>

      <!-- Line 10-15: JSON output -->
      <text y="164" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94a3b8">{</text>
      <text y="182" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5">
        <tspan fill="#94a3b8">  "</tspan><tspan fill="#7dd3fc">campaigns</tspan><tspan fill="#94a3b8">": [</tspan>
      </text>
      <text y="200" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5">
        <tspan fill="#94a3b8">    { "</tspan><tspan fill="#7dd3fc">name</tspan><tspan fill="#94a3b8">": "</tspan><tspan fill="#a5b4fc">Brand - US</tspan><tspan fill="#94a3b8">", "</tspan><tspan fill="#7dd3fc">status</tspan><tspan fill="#94a3b8">": "</tspan><tspan fill="#34d399">ENABLED</tspan><tspan fill="#94a3b8">" },</tspan>
      </text>
      <text y="218" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5">
        <tspan fill="#94a3b8">    { "</tspan><tspan fill="#7dd3fc">name</tspan><tspan fill="#94a3b8">": "</tspan><tspan fill="#a5b4fc">Discovery - EU</tspan><tspan fill="#94a3b8">", "</tspan><tspan fill="#7dd3fc">status</tspan><tspan fill="#94a3b8">": "</tspan><tspan fill="#34d399">ENABLED</tspan><tspan fill="#94a3b8">" },</tspan>
      </text>
      <text y="236" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5">
        <tspan fill="#94a3b8">    { "</tspan><tspan fill="#7dd3fc">name</tspan><tspan fill="#94a3b8">": "</tspan><tspan fill="#a5b4fc">Competitor - JP</tspan><tspan fill="#94a3b8">", "</tspan><tspan fill="#7dd3fc">status</tspan><tspan fill="#94a3b8">": "</tspan><tspan fill="#fbbf24">PAUSED</tspan><tspan fill="#94a3b8">" }</tspan>
      </text>
      <text y="254" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94a3b8">  ]</text>
      <text y="268" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94a3b8">}</text>
    </g>
  </g>
</svg>
